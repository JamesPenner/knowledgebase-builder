{% if not assigned %}
<p class="empty-state">No face clusters assigned yet.</p>
{% else %}
<table class="token-table">
  <thead>
    <tr>
      <th>Cluster</th>
      <th>Person</th>
      <th>Faces</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for d in assigned %}
    <tr>
      <td>#{{ d.id }}</td>
      <td>{{ people_map.get(d.person_id, d.label or "—") }}</td>
      <td>{{ d.member_count }}</td>
      <td>
        <form hx-post="/review/faces/decide?kb={{ kb }}" hx-swap="none">
          <input type="hidden" name="cluster_id" value="{{ d.id }}">
          <input type="hidden" name="action" value="unassign">
          <button type="submit" class="btn btn--danger">Unassign</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endif %}

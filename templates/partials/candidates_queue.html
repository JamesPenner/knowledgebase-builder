{% if candidates %}
<div class="bulk-actions">
  <span class="bulk-label">All pending:</span>
  <form class="action-form"
        hx-post="/review/suggest/decide-all?kb={{ kb }}"
        hx-swap="none">
    <input type="hidden" name="action" value="accept">
    <button type="submit" class="btn btn--capture"
            title="Add all pending terms to vocabulary">Accept All</button>
  </form>
  <form class="action-form"
        hx-post="/review/suggest/decide-all?kb={{ kb }}"
        hx-swap="none">
    <input type="hidden" name="action" value="ignore">
    <button type="submit" class="btn btn--ignore"
            title="Add all pending terms to stoplist — permanently excluded from future suggestions">Ignore All</button>
  </form>
  <form class="action-form"
        hx-post="/review/suggest/decide-all?kb={{ kb }}"
        hx-swap="none">
    <input type="hidden" name="action" value="reject">
    <button type="submit" class="btn btn--reject"
            title="Dismiss all pending terms — won't resurface next run, stoplist unchanged">Reject All</button>
  </form>
</div>
<table class="token-table">
  <tbody>
  {% for c in candidates %}
  <tr class="token-row" id="candidate-row-{{ c.id }}">
    <td class="token-name">
      {{ c.term }}
    </td>
    <td class="token-actions">
      <form class="action-form"
            hx-post="/review/suggest/decide?kb={{ kb }}"
            hx-swap="none">
        <input type="hidden" name="candidate_id" value="{{ c.id }}">
        <input type="hidden" name="action" value="accept">
        <button type="submit" class="btn btn--capture"
                title="Add to vocabulary — term will be included in LLM prompts">Accept</button>
      </form>

      <form class="action-form"
            hx-post="/review/suggest/decide?kb={{ kb }}"
            hx-swap="none">
        <input type="hidden" name="candidate_id" value="{{ c.id }}">
        <input type="hidden" name="action" value="ignore">
        <button type="submit" class="btn btn--ignore"
                title="Add to stoplist — permanently excluded from future suggestions">Ignore</button>
      </form>

      <form class="action-form"
            hx-post="/review/suggest/decide?kb={{ kb }}"
            hx-swap="none">
        <input type="hidden" name="candidate_id" value="{{ c.id }}">
        <input type="hidden" name="action" value="correct">
        <input type="text" name="corrected_to" placeholder="Correct to…" class="input-text" required>
        <button type="submit" class="btn btn--correct"
                title="Accept a corrected form — adds the corrected term to vocabulary">Correct</button>
      </form>

      <form class="action-form"
            hx-post="/review/suggest/decide?kb={{ kb }}"
            hx-swap="none">
        <input type="hidden" name="candidate_id" value="{{ c.id }}">
        <input type="hidden" name="action" value="reject">
        <button type="submit" class="btn btn--reject"
                title="Dismiss without adding to vocabulary or stoplist — won't resurface next run">Reject</button>
      </form>
    </td>
  </tr>
  {% if c.notes %}
  <tr class="notes-row">
    <td colspan="2">
      <details class="level-c-notes">
        <summary>Reasoning</summary>
        <p class="notes-text">{{ c.notes }}</p>
      </details>
    </td>
  </tr>
  {% endif %}
  {% endfor %}
  </tbody>
</table>
{% else %}
<p class="empty-state">No pending candidates. Run <code>enrich pipeline suggest</code> to generate suggestions.</p>
{% endif %}

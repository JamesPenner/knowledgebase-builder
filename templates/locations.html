{% extends "base.html" %}
{% block title %}Locations — {{ kb }}{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
{% endblock %}

{% block content %}
<h1 class="page-title">Location Clusters</h1>
<div style="display:flex;gap:1.5rem;align-items:flex-start">
  <div id="map" style="flex:1;min-width:0;height:520px;border-radius:6px;overflow:hidden"></div>
  <div id="cluster-list"
       style="width:400px;flex-shrink:0"
       hx-get="/knowledge/locations/partials/cluster-list?kb={{ kb }}"
       hx-trigger="load, clustersChanged from:body"
       hx-swap="innerHTML">
    <p class="empty-state">Loading…</p>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/js/locations_map.js"></script>
{% endblock %}

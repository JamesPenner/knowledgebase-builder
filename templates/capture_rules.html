{% extends "base.html" %}
{% block title %}Capture Rules — {{ kb }}{% endblock %}
{% block content %}
<h1 class="page-title">Capture Rules</h1>
<p style="color:#64748b;margin-bottom:1.25rem;font-size:.9rem">
  Regex patterns that extract structured fields (dates, codes, etc.) from filename tokens during the Normalize stage.
</p>

<div style="display:flex;gap:1.5rem;align-items:flex-start">
  <div id="capture-rule-list"
       style="flex:1;min-width:0"
       hx-get="/knowledge/capture-rules/partials/list?kb={{ kb }}"
       hx-trigger="load, rulesChanged from:body"
       hx-swap="innerHTML">
    <p class="empty-state">Loading…</p>
  </div>
  <div id="capture-rule-form" style="width:420px;flex-shrink:0"
       hx-get="/knowledge/capture-rules/partials/form?kb={{ kb }}"
       hx-trigger="load"
       hx-swap="innerHTML">
  </div>
</div>
{% endblock %}
